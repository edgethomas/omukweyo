<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Omukweyo sign-in link</title>
  </head>
  <body style="margin:0;background:#f6f8fb;font-family:Arial,Helvetica,sans-serif;color:#172033;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">Use your Omukweyo sign-in link.</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f8fb;padding:32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border:1px solid #e4e9f2;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:26px 30px 22px;border-bottom:1px solid #e4e9f2;background:#ffffff;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="width:52px;vertical-align:middle;">
                      <img src="{{ .SiteURL }}/omukweyo-email-logo.svg" width="44" height="44" alt="Omukweyo" style="display:block;border:0;border-radius:12px;">
                    </td>
                    <td style="vertical-align:middle;padding-left:12px;">
                      <div style="font-size:21px;line-height:1.1;font-weight:800;color:#0f172a;letter-spacing:-0.01em;">Omukweyo</div>
                      <div style="font-size:13px;line-height:1.5;color:#64748b;margin-top:3px;">Stand in line without standing there</div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <h1 style="font-size:22px;line-height:1.25;margin:0 0 12px;color:#0f172a;">Sign in to Omukweyo</h1>
                <p style="font-size:15px;line-height:1.6;margin:0 0 22px;color:#475569;">Use this one-time link to sign in. The link expires shortly and can only be used once.</p>
                <p style="margin:0 0 24px;"><a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;font-weight:700;font-size:14px;padding:12px 18px;border-radius:8px;">Sign in</a></p>
                <p style="font-size:12px;line-height:1.6;margin:0;color:#64748b;">One-time code: <strong style="color:#0f172a;">{{ .Token }}</strong></p>
                <p style="font-size:12px;line-height:1.6;margin:6px 0 0;color:#2563eb;word-break:break-all;">{{ .ConfirmationURL }}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 30px;background:#f8fafc;border-top:1px solid #e4e9f2;">
                <div style="font-size:12px;line-height:1.6;color:#64748b;">Omukweyo</div>
                <div style="font-size:12px;line-height:1.6;color:#64748b;"><a href="{{ .SiteURL }}" style="color:#2563eb;text-decoration:none;">omukweyo.com</a> &middot; <a href="{{ .SiteURL }}/contact" style="color:#2563eb;text-decoration:none;">Support</a></div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
